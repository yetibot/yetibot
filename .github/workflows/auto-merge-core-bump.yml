name: Auto-merge yetibot/core bumps

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'yetibot-admin' &&
      startsWith(github.event.pull_request.title, 'Bump yetibot/core to')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Approve and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.YETIBOT_GITHUB_TOKEN }}
        run: |
          gh pr review --approve ${{ github.event.pull_request.number }}
          gh pr merge --auto --squash --delete-branch ${{ github.event.pull_request.number }}
